<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Blue glow blobs -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="#1d4ed8" opacity="0.12"/>
  <ellipse cx="1050" cy="500" rx="250" ry="180" fill="#3b82f6" opacity="0.10"/>

  <!-- Top accent bar -->
  <rect width="1200" height="5" fill="#3b82f6"/>

  <!-- Left side vertical accent -->
  <rect x="80" y="160" width="5" height="310" rx="3" fill="#3b82f6" opacity="0.8"/>

  <!-- Document icon -->
  <g transform="translate(110, 185)">
    <rect width="64" height="80" rx="6" fill="#1e40af" opacity="0.9"/>
    <rect x="10" y="18" width="44" height="4" rx="2" fill="#93c5fd"/>
    <rect x="10" y="30" width="44" height="4" rx="2" fill="#93c5fd" opacity="0.7"/>
    <rect x="10" y="42" width="32" height="4" rx="2" fill="#93c5fd" opacity="0.5"/>
    <rect x="10" y="54" width="38" height="4" rx="2" fill="#93c5fd" opacity="0.4"/>
    <!-- Checkmark badge -->
    <circle cx="54" cy="12" r="14" fill="#22c55e"/>
    <path d="M47 12 L52 17 L62 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- App name -->
  <text x="200" y="255" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="#f8fafc" letter-spacing="-1">Investment CAR Builder</text>

  <!-- Tagline -->
  <text x="200" y="320" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#94a3b8">Professional Client Advice Record — built for advisors</text>

  <!-- Divider -->
  <rect x="200" y="360" width="800" height="1.5" fill="#1e293b"/>

  <!-- Feature pills -->
  <g transform="translate(200, 385)">
    <!-- Pill 1 -->
    <rect width="190" height="44" rx="22" fill="#1e3a5f"/>
    <text x="95" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="600" fill="#60a5fa" text-anchor="middle">✦ Smart Paragraphs</text>

    <!-- Pill 2 -->
    <rect x="210" width="210" height="44" rx="22" fill="#1e3a5f"/>
    <text x="315" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="600" fill="#60a5fa" text-anchor="middle">✦ Commission Disclosure</text>

    <!-- Pill 3 -->
    <rect x="440" width="170" height="44" rx="22" fill="#1e3a5f"/>
    <text x="525" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="600" fill="#60a5fa" text-anchor="middle">✦ Print-Ready PDF</text>
  </g>

  <!-- Bottom branding -->
  <text x="200" y="580" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#475569" letter-spacing="2">FAIRBAIRN CONSULT</text>
  <text x="600" y="580" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#334155" text-anchor="middle">Financial Advice · Compliance · Excellence</text>

  <!-- Bottom accent bar -->
  <rect y="625" width="1200" height="5" fill="#1d4ed8"/>
</svg>
